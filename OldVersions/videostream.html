<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/webrtc-adapter@8.2.3/out/adapter.js"></script>
</head>
<body>
    <div class="theme-switch">...</div>

    <div class="container">
        <div class="top-row">

            <div class="heart-wrap chart-wrap">...</div>


            <div class="gaze-wrap">
                <h2>Eye Gaze Tracker + Gameplay</h2>
                <div style="position: relative; width: 100%; aspect-ratio: 16/9; background: #000;">
                    <video id="gameplayVideo" autoplay playsinline muted style="position: absolute; top:0; left:0; width:100%; height:100%; object-fit:contain; z-index:1;"></video>
                    <canvas id="gazeCanvas" width="500" height="300" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:2;"></canvas>
                </div>
            </div>
        </div>
        <div class="bottom-row">

            <div class="gsr-wrap chart-wrap">...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/webrtc-adapter@8.2.3/out/adapter.js"></script>

    <script>

        const video = document.getElementById('gameplayVideo');
        const streamId = 'unity';
        const whepUrl = `http://localhost:8889/${streamId}/whep`;

        const pc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });

        pc.ontrack = (event) => {
            video.srcObject = event.streams[0];
        };

        pc.addTransceiver('video', { direction: 'recvonly' });
        pc.addTransceiver('audio', { direction: 'recvonly' });

        pc.createOffer()
            .then(offer => pc.setLocalDescription(offer))
            .then(() => fetch(whepUrl, {
                method: 'POST',
                body: pc.localDescription.sdp,
                headers: { 'Content-Type': 'application/sdp' }
            }))
            .then(res => res.text())
            .then(answer => pc.setRemoteDescription({ type: 'answer', sdp: answer }))
            .catch(console.error);


    </script>
</body>
</html>
